interface:
  display_name: "Resonance Contract"
  short_description: "User-side CA-only direct-pair and queue flows for ResonanceContract v2.0.0"
  default_prompt: "Use $resonance-contract to help this user participate in ResonanceContract through the current CA-only flow: for write requests, confirm local CA context, ask which local CA account to use if multiple are available, and ensure a usable local relayer or signer is available; for read-only diagnostics, allow ca_hash or ca_address lookup without forcing local CA selection. Choose direct pair or automatic queue matching, create or confirm a pair request with ca_hash inputs, join or leave the queue, keep replies summary-first with visible `skill_version` and `dependency_versions.portkey_ca`, route every resonance `Get*` through direct view reads, treat receipts from older or unsupported routes as not part of the current CA-only runbook, treat non-view send receipts as insufficient for current state reads when the current method should have been a direct view, and only expand Technical Details when the user explicitly asks."

policy:
  allow_implicit_invocation: true
